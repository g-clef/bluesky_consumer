apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service-driver
  namespace: bluesky
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service-driver
  template:
    metadata:
      labels:
        app: query-service-driver
    spec:
      containers:
      - name: query-service-driver
        image: gclef/bluesky-query-service:0.0.1
        imagePullPolicy: Always
        env:
        - name: S3_ENDPOINT_URL
          value: "http://minio.minio.svc.cluster.local"
        - name: S3_BUCKET
          value: "bluesky-data"
        - name: S3_REGION
          value: "us-east-1"
        - name: RAY_ADDRESS
          value: "ray://homelab-ray-head-svc.ray.svc.cluster.local:10001"
        - name: DEFAULT_QUERY_LIMIT
          value: "10000"
        - name: STORAGE_PARTITION_FORMAT
          value: "year={year}/month={month}/day={day}/hour={hour}"
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: s3-credentials
              key: secret-access-key
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi